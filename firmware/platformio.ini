; NhipSang firmware — ESP32 WS2812B renderer.
; NOTE: this is a PlatformIO (C++) project and is NOT part of the pnpm workspace.
; Build with PlatformIO, not pnpm. Real renderer + bridge node land in TIP-008.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    fastled/FastLED
