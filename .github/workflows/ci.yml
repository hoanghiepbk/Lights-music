# NhipSang CI — tiered eval gate (TIP-007). Repo root = this folder (nhipsang/, D-009).
# The gate-bites demo (eval/demo) is intentionally NOT run here.
name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: typecheck · lint · critical (required) · quality (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Critical tier — REQUIRED. A failure here fails the workflow (blocks merge).
      - name: Critical gate (required)
        run: pnpm test:critical

      # Quality tier — informational only; never reds the build.
      - name: Quality (informational)
        run: pnpm test:quality
        continue-on-error: true
